<!DOCTYPE html>
<html lang="ko">
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="분당서울대학교병원 재생의학센터 공식 앱 - 오가노이드 서비스, Clean Bench 예약, 재료 구매">
  <meta name="keywords" content="재생의학센터, 오가노이드, 분당서울대병원, RMC, 첨단재생의료">

  <!-- ── Android PWA ── -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1A237E">

  <!-- ── iOS PWA (Safari 홈 화면 추가) ── -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RMC Hub">

  <!-- iOS 아이콘 (여러 사이즈) -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">

  <!-- iOS 스플래시 스크린 배경색 -->
  <meta name="msapplication-TileColor" content="#1A237E">
  <meta name="msapplication-TileImage" content="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="shortcut icon" href="favicon.png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <title>RMC Hub - 재생의학센터</title>

  <style>
    /* PWA 로딩 스플래시 */
    body {
      margin: 0;
      background-color: #1A237E;
    }
    #pwa-splash {
      position: fixed;
      inset: 0;
      background: #1A237E;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #pwa-splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #pwa-splash img {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      margin-bottom: 20px;
    }
    #pwa-splash h1 {
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 6px 0;
      letter-spacing: 1px;
    }
    #pwa-splash p {
      color: rgba(255,255,255,0.7);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      margin: 0;
    }
    #pwa-splash .loader {
      margin-top: 48px;
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- PWA 네이티브 스플래시 -->
  <div id="pwa-splash">
    <img src="icons/Icon-192.png" alt="RMC Hub">
    <h1>RMC Hub</h1>
    <p>분당서울대학교병원 재생의학센터</p>
    <div class="loader"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Flutter 로드 완료 후 스플래시 숨김
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('pwa-splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function() { splash.remove(); }, 600);
      }
    });

    // PWA 설치 프롬프트 저장 (Android Chrome 자동 배너)
    window.deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window.deferredPrompt = e;
    });

    // ── 자동 업데이트 Service Worker 등록 ──
    if ('serviceWorker' in navigator) {
      // 기존 Flutter SW 등록 해제 후 커스텀 SW 등록
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        // 이미 등록된 SW 목록 확인
        registrations.forEach(function(reg) {
          // flutter_service_worker 가 아닌 우리 SW가 아닌 경우 해제
          if (reg.active && reg.active.scriptURL.indexOf('sw_update.js') === -1) {
            console.log('[PWA] Unregistering old SW:', reg.active.scriptURL);
            reg.unregister();
          }
        });
      });

      // 커스텀 자동 업데이트 SW 등록
      navigator.serviceWorker.register('/sw_update.js', { scope: '/' })
        .then(function(registration) {
          console.log('[PWA] Auto-update SW registered');

          // 1분마다 업데이트 체크
          setInterval(function() {
            registration.update();
            console.log('[PWA] Checking for updates...');
          }, 60000);

          // 새 SW가 설치 대기 중이면 즉시 활성화
          registration.addEventListener('updatefound', function() {
            var newWorker = registration.installing;
            console.log('[PWA] New version found! Installing...');
            if (newWorker) {
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('[PWA] New version installed, activating...');
                  newWorker.postMessage('skipWaiting');
                }
              });
            }
          });
        })
        .catch(function(err) {
          console.log('[PWA] SW registration failed:', err);
        });

      // SW가 업데이트 완료 메시지 보내면 페이지 자동 새로고침
      navigator.serviceWorker.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'SW_UPDATED') {
          console.log('[PWA] Updated to version:', event.data.version);
          // 약간의 딜레이 후 새로고침 (앱 로딩 중 방해 방지)
          setTimeout(function() {
            window.location.reload();
          }, 1000);
        }
      });

      // 컨트롤러가 바뀌면(새 SW 활성화) 자동 새로고침
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (!refreshing) {
          refreshing = true;
          console.log('[PWA] Controller changed, reloading...');
          window.location.reload();
        }
      });
    }
  </script>
</body>
</html>
